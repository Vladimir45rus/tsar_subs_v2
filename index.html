<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Царь-Подписки</title>
    
    <!-- Настройки экрана для мобильных (чтобы было на весь экран) -->
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Безопасность (как у тебя было) -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: content:; connect-src *; frame-src *;">
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- === ВОТ ЭТО МЫ ДОБАВИЛИ === -->
    <!-- Твоя иконка для вкладки браузера и рабочего стола -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    
    <!-- Подключение манифеста (где прописано имя и иконка приложения) -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Цвет темы (чтобы адресная строка браузера была черной/темной) -->
    <meta name="theme-color" content="#0a0a0a" />
    <!-- ========================== -->

    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        background: #050510; 
        margin: 0; 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
